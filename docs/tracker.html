<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Calorie Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <h1>Calorie Tracker</h1>
        <p class="subtitle">Manage your goals and calorie history.</p>
      </div>
      <nav class="nav-links">
        <a class="nav-link" href="./index.html">Recipe Finder</a>
        <a class="nav-link active" href="./tracker.html">Calorie Tracker</a>
        <a class="nav-link" href="./profile.html">Profile</a>
      </nav>
    </header>

    <section class="panel">
      <h2>Daily Goal</h2>
      <div class="goal-box">
        <input id="goalInput" type="number" min="1000" max="10000" placeholder="1000 - 10000">
        <button id="saveGoalBtn" type="button">Save Goal</button>
      </div>
      <div id="goalMessage" class="message"></div>

      <div class="log-summary">Goal: <span id="goalDisplay">Not set</span></div>
      <div class="log-summary">Total Calories Today: <span id="totalCalories">0</span></div>
      <div class="log-summary">Status: <span id="goalStatus">No goal set</span></div>

      <ul id="logEntries" class="log-list"></ul>
      <button id="clearLogBtn" type="button" class="danger-btn">Clear Today’s Log</button>
    </section>

    <section class="panel">
      <h2>History</h2>
      <div id="historyList" class="history-list"></div>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
