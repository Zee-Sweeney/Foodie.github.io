<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <h1>Profile</h1>
        <p class="subtitle">Manage your profile and saved recipes.</p>
      </div>
      <nav class="nav-links">
        <a class="nav-link" href="./index.html">Recipe Finder</a>
        <a class="nav-link" href="./tracker.html">Calorie Tracker</a>
        <a class="nav-link active" href="./profile.html">Profile</a>
      </nav>
    </header>

    <section class="panel">
      <h2>Your Profile</h2>
      <div class="profile-box">
        <input id="profileName" type="text" placeholder="Enter your name">
        <button id="saveProfileBtn" type="button">Save Profile</button>
      </div>

      <div class="profile-card">
        <p><strong>Name:</strong> <span id="profileNameDisplay">Not set</span></p>
        <p><strong>Saved Recipes:</strong> <span id="savedRecipeCount">0</span></p>
        <p><strong>Total Saved Recipe Calories:</strong> <span id="savedRecipeCalories">0</span></p>
      </div>
    </section>

    <section class="panel">
      <h2>Saved Recipes</h2>
      <div id="savedRecipesList" class="results"></div>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
